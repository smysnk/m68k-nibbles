name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_STATION_BRANCH: ${{ github.head_ref || github.ref_name }}
      TEST_STATION_BUILD_NUMBER: ${{ github.run_number }}
      TEST_STATION_COMMIT_SHA: ${{ github.sha }}
      TEST_STATION_REPOSITORY: ${{ github.repository }}
      TEST_STATION_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
      TEST_STATION_SOURCE_PROVIDER: github-actions
      TEST_STATION_SOURCE_RUN_ID: ${{ github.run_id }}
      TEST_STATION_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate project Yarn
        run: |
          package_manager="$(node -p "require('./package.json').packageManager")"
          corepack prepare "$package_manager" --activate

      - name: Check Yarn version
        run: yarn --version

      - name: Install root tooling
        run: yarn install --immutable

      - name: Install vendored interpreter dependencies
        run: yarn --cwd ./references/m68k-interpreter install --immutable

      - name: Install Playwright browsers for vendored interpreter
        run: yarn --cwd ./references/m68k-interpreter exec playwright install --with-deps chromium

      - name: Capture test-station start time
        run: echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Validate test-station metadata helper
        run: yarn test:metadata

      - name: Run test-station report
        id: test_station
        shell: bash
        run: |
          set +e
          yarn test:coverage
          exit_code=$?
          if [ "$exit_code" -eq 0 ]; then
            status=passed
          else
            status=failed
          fi
          echo "TEST_STATION_CI_STATUS=$status" >> "$GITHUB_ENV"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish test-station summary
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import fs from "node:fs";
          const report = JSON.parse(fs.readFileSync(".test-results/test-station/report.json", "utf8"));
          const summary = report.summary || {};
          const coveragePct = summary.coverage?.lines?.pct;
          console.log("### Test Station Summary");
          console.log("");
          console.log(`- Packages: ${summary.totalPackages ?? 0}`);
          console.log(`- Suites: ${summary.totalSuites ?? 0}`);
          console.log(`- Tests: ${summary.totalTests ?? 0}`);
          console.log(`- Failed tests: ${summary.failedTests ?? 0}`);
          console.log(`- Failed packages: ${summary.failedPackages ?? 0}`);
          console.log(`- Line coverage: ${Number.isFinite(coveragePct) ? `${coveragePct}%` : "n/a"}`);
          EOF

      - name: Publish test-station ingest
        if: always() && hashFiles('.test-results/test-station/report.json') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        env:
          TEST_STATION_INGEST_ENDPOINT: https://test-station.smysnk.com/api/ingest
          TEST_STATION_INGEST_PROJECT_KEY: m68k-nibbles
          TEST_STATION_INGEST_SHARED_KEY: ${{ secrets.TEST_STATION_INGEST_SHARED_KEY }}
        run: |
          if [ -z "$TEST_STATION_INGEST_SHARED_KEY" ]; then
            echo "Skipping test-station ingest: TEST_STATION_INGEST_SHARED_KEY is not configured."
            exit 0
          fi
          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export TEST_STATION_BUILD_COMPLETED_AT="$completed_at"
          echo "TEST_STATION_BUILD_COMPLETED_AT=$completed_at" >> "$GITHUB_ENV"
          node ./scripts/test-station/publish-ingest-report.mjs

      - name: Upload test artifacts
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        uses: actions/upload-artifact@v6
        with:
          name: test-station-results
          path: |
            .test-results/test-station
            references/m68k-interpreter/.test-results/playwright
          retention-days: 14

      - name: Fail if report detected regressions
        if: always()
        run: |
          exit_code="${{ steps.test_station.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            echo "Missing test_station exit_code output; failing workflow."
            exit_code=1
          fi
          exit "$exit_code"
